<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Clair Collective is the number one destination for premium fashion and lifestyle products.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <title>Clair Collective | Carousel product</title>
</head>
<!-- Requirements: The Specific Product Page features more details about a specific product that was navigated to from the thumbnail of the Product Feed Page
    User Stories:
    As a user, I want to see a responsive layout showing the product's title, description, price, discounted price (if applicable), rating, reviews, and tags fetched from the API
    As a user, I want each specific product page to have a "share" icon with a shareable URL (including a query string or hash parameter containing the product ID), so I can share the product with others easily
    As the user, when logged in, I want an "Add to Cart" button on the product page, so I can add products to my shopping cart -->
<body>
    <header class="header">
    <nav class="nav">
        <div class="logo"><a href="../index.html"><img src="../assets/CC_logo_cropped.png" alt="Clair Collective"></a></div>
        <ul>
            <li><a href="../product/allProducts.html">All Products</a></li>
            <li><a href="../account/login.html">Profile</a></li>
            <li><a href="../cart/index.html">Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
    </nav>
</header>
<main>
    <article class="carouselProduct">
        <h1>Blue Shoes</h1>
        <section class="productDetails">
            <figure>
            <img src="https://static.noroff.dev/api/online-shop/18-shoes-blue.jpg" alt="A pair of stylish blue suede shoes for both formal and casual occasions.">
            </figure>
            <div class="productInformation">
                <p>Step out in style with our comfortable blue suede shoes, perfect for any occasion.</p>
                <p>$599.99</p>
                <a href="../cart/" class="ctaButton">Add to Cart</a>
            </div>
        </section>
        <hr class="sectionDivider">
        <section class="reviews">
            <h2>Customer Reviews</h2>
            <article class="review">
                <h3>John Doe</h3>
                <p>Rating:</p>
                <p>Comment:</p>
            </article>
        </section>
    </article>
</main>
    <footer>
    <div class="logo"><a href="../index.html"><img src="../assets/CC_logo_cropped.png" alt="Clair Collective"></a></div>
    <p>&copy; 2024 Clair Collective. All rights reserved.</p>
</footer>
</body>
</html>
