<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Clair Collective is the number one destination for premium fashion and lifestyle products.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <title>Clair Collective | Home</title>
<!-- Method: POST /auth/register
Path: /account/register.html
User Stories: As a user, I want a validated register form that allows me to create a new account by entering my email and password -->
</head>
<body>
<header class="header">
    <div class="off-screen-menu">
        <!-- Code for hamburger menu was taken from https://www.youtube.com/watch?v=aNDqzlAKmZc and modified to fit the project. Link to the GitHub repo: https://github.com/treehouse/ham-menu . Accessed 30.04.2026. -->
        <ul>
            <li><a href="../product/allProducts.html">All Products</a></li>
            <li><a href="../account/login.html">Profile</a></li>
            <li><a href="../cart/index.html">Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
    </div>
    <nav class="nav">
        <div class="logo"><a href="../index.html"><img src="../assets/CC_logo_cropped.png" alt="Clair Collective"></a></div>
        <ul class="navLinks">
            <li><a href="../product/allProducts.html">All Products</a></li>
            <li><a href="../account/login.html">Profile</a></li>
            <li><a href="../cart/index.html">Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
        <div class="ham-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
</header>
<main>
    <section class="loginNewUser">
        <h1>Join the Clair Collective community!</h1>
        <form id="register-form" action="/auth/register" method="POST">
            <h2>Create your account</h2>
            <div>
                <label for="email">Email:</label>
                <input type="email" placeholder="YourEmail@email.com" id="email" name="email" required>
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" placeholder="Your Password" id="password" name="password" required>
            </div>
            <button type="submit" class="ctaButton">Register</button>
        <p>Already have an account? <a href="../account/login.html" class="clickHere">Login here</a></p>
        </form>
    </section>
</main>
<footer>
    <div class="logo"><a href="../index.html"><img src="../assets/CC_logo_cropped.png" alt="Clair Collective"></a></div>
    <p>&copy; 2024 Clair Collective. All rights reserved.</p>
</footer>
<script src="../phone.js"></script>
</body>
</html>
