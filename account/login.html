<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Clair Collective is the number one destination for premium fashion and lifestyle products.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- <link href="https://fontawesome.com/icons/eye?f=classic&s=solid" crossorigin>
    <link href="https://fontawesome.com/icons/eye-slash?f=classic&s=solid" crossorigin> -->
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <title>Clair Collective | Home</title>
    <!-- Method: POST /auth/login
Path: /account/login.html
User Stories: As a user, I want a validated login form that allows me to request and save a token to my browser by entering my email and password, allowing me to make purchases -->
</head>
<body>
<header class="header">
    <nav class="nav">
        <div class="logo"><a href="../index.html"><img src="../assets/CC_logo_cropped.png" alt="Clair Collective"></a></div>
        <ul>
            <li><a href="../product/allProducts.html">All Products</a></li>
            <li><a href="../account/login.html">Profile</a></li>
            <li><a href="../cart/index.html">Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
    </nav>
</header>
<main>
    <section class="loginOldUser">
        <h1>Welcome back to Clair Collective!</h1>
        <!-- Login Form -->
        <form id="login-form" action="/auth/login" method="POST">
            <h2>Login</h2>
            <div>
                <label for="email">Email:</label>
                <input type="email" placeholder="Email" id="email" name="email" required>
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" placeholder="Password" id="pswInput" name="password" required>
            </div>
            <div class="checkbox">
                <label for="show-password">
                    <input type="checkbox" id="show-password" onclick="togglePassword()">Show Password
                </label>
                <label for="remember">
                    <input type="checkbox" id="remember" name="remember">Remember me
                </label>
            </div>
            <button type="submit" class="ctaButton">Login</button>
            <p><a href="../account/forgotPassword.html">Forgot your password?</a></p>
        <!-- New user?-->
        <p>Don't have an account? <a href="../account/register.html" class="clickHere">Register here</a></p>
        </form>
    </section>
</main>
<footer>
    <div class="logo"><a href="../index.html"><img src="../assets/CC_logo_cropped.png" alt="Clair Collective"></a></div>
    <p>&copy; 2024 Clair Collective. All rights reserved.</p>
</footer>
<script src="/account/login.js" defer></script>
</body>
</html>
