    <link rel="stylesheet" href="../styles.css">
    <title>Clair Collective | All products</title>
</head>
<body>
<header class="header">
    <div class="off-screen-menu">
        <!-- Code for hamburger menu was taken from https://www.youtube.com/watch?v=aNDqzlAKmZc and modified to fit the project. Link to the GitHub repo: https://github.com/treehouse/ham-menu . Accessed 30.04.2026. -->
        <ul>
            <li><a href="../product/allProducts.html">All Products</a></li>
            <li><a href="../account/login.html">Profile</a></li>
            <li><a href="../cart/index.html">Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
    </div>
    <nav class="nav">
        <div class="logo"><a href="../index.html"><img src="../assets/CC_logo_cropped.png" alt="Clair Collective"></a></div>
        <ul class="navLinks">
            <li><a href="./product/allProducts.html">All Products</a></li>
            <li><a href="./account/login.html">Profile</a></li>
            <li><a href="./cart/index.html">Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
        <div class="ham-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
</header>
<main>
    <section>
        <h1>All Products</h1>
        <div class="filter-group">
            <label for="category" class="category">Category:</label>
            <select id="category">
                <option value="all">All Categories</option>
                <optgroup label="Technology & Electronics">
                    <option value="audio">Audio</option>
                    <option value="computers">Computers</option>
                    <option value="electronics">Electronics</option>
                    <option value="gaming">Gaming</option>
                    <option value="headphones">Headphones</option>
                    <option value="peripherals">Peripherals</option>
                    <option value="storage">Storage</option>
                    <option value="wearables">Wearables</option>
                </optgroup>
                <optgroup label="Fashion & Style">
                    <option value="accessories">Accessories</option>
                    <option value="bags">Bags</option>
                    <option value="fashion">Fashion</option>
                    <option value="glasses">Glasses</option>
                    <option value="jewelry">Jewelry</option>
                    <option value="shoes">Shoes</option>
                    <option value="watch">Watch</option>
                    <option value="watch">Watches</option>
                </optgroup>
                <optgroup label="Beauty & Personal Care">
                    <option value="beauty">Beauty</option>
                    <option value="perfume">Perfume</option>
                    <option value="shampoo">Shampoo</option>
                    <option value="skincare">Skin Care</option>
                </optgroup>
                <optgroup label="Other">
                    <option value="toy">Toy</option>
                </optgroup>
            </select>
        </div>
        <div id="container" class="container"></div>
    </section>
    <button onclick="topFunction()" id="toTopBtn" title="Go to top">Top</button>
        <!-- To Top button is taken from this website: https://www.w3schools.com/howto/howto_js_scroll_to_top.asp -->
</main>
<footer>
    <div class="logo"><a href="../index.html"><img src="../assets/CC_logo_cropped.png" alt="Clair Collective"></a></div>
    <p>&copy; 2024 Clair Collective. All rights reserved.</p>
</footer>

</html>
