<!DOCTYPE html>
<!-- 
REQUIREMENTS: The Product Feed Page must include a carousel and a list of at least 12 products.
User Stories:
As a user, I want to see an interactive banner carousel on the product feed page, so that I can view a rotation of three products
As a user, I want to click on the previous or next button in the carousel to animate and reveal another product, to ensure I can see different products easily
As a user, I want the carousel to return to the first product after reaching the end of the list, and vice versa when clicking previous on the first product
As a user, I want to click on a button for each carousel item, which will take me to the product page, where I can view more details
As a user, I want to view a list of the 12 products in a responsive thumbnail grid on the product feed page, so I can easily select which product to view
As a user, I want each thumbnail image in the product feed to be clickable, taking me to the product page to see more details about that specific product -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Clair Collective is the number one destination for premium fashion and lifestyle products.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="carousel.js" defer></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Clair Collective | Home</title>
</head>
<body>
<header class="header">
    <nav class="nav">
        <div class="logo"><a href="./views/Home/index.html">Clair Collective</a></div>
        <ul>
            <li><a href="/pages/products.html">All Products</a></li>
            <li><a href="account/login.html">Profile</a></li>
            <li><a href="cart/index.html">Cart</a></li>
        </ul>
        <i class="fa-solid fa-cart-shopping"></i><a href="./views/checkout/index.html">Cart (<span id="cart-count">0</span>)</a>
        </div>
    </nav>    
</header>
<main>
    <section aria-label="Newest products">
        <div class="carousel" data-carousel>
            <button class="carousel-button prev" aria-label="Previous product" data-carousel-button="prev">&#10147;</button>
            <button class="carousel-button next" aria-label="Next product" data-carousel-button="next">&#10147;</button>
            <ul data-slides>
                <li class="slide" id="slide-1" data-active>
                    <img src="https://static.noroff.dev/api/online-shop/5-headphones-black.jpg" alt="A set of wireless black headphones.">
                </li>
                <li class="slide" id="slide-2">
                    <img src="https://static.noroff.dev/api/online-shop/15-watch-black.jpg" alt="A classic black leather watch, perfect for any occasion.">
                </li>
                <li class="slide" id="slide-3">
                    <img src="https://static.noroff.dev/api/online-shop/18-shoes-blue.jpg" alt="A pair of stylish blue suede shoes for both formal and casual occasions.">
                </li>
            </ul>
            <div class="slider-nav">
                <a href="#slide-1"></a>
                <a href="#slide-2"></a>
                <a href="#slide-3"></a>
            </div>
        </div>
    </section>
</main>
<!-- <script src="script.js"></script> -->
</body>
</html>
